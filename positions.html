<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Internship Positions — Field Experience BHS</title>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dsbllwpbh/image/upload/v1771966521/fieldexperience-favicon_jgdotp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: {
        colors: {
          crimson: { 50:'#fef2f2',100:'#fee2e2',200:'#fdcbcb',300:'#fba5a6',400:'#f56d6f',500:'#eb4044',600:'#d72429',700:'#b91c22',800:'#AC161D',900:'#851519' },
          navy:    { 50:'#f5f5f5',100:'#e5e5e5',200:'#D9D9D9',300:'#b3b3b3',400:'#8a8a8a',500:'#5D5D5D',600:'#4a4a4a',700:'#333333',800:'#1a1a1a',900:'#000000' },
          gold:    { 50:'#fffde6',100:'#fffabd',200:'#fff48a',300:'#ffe94d',400:'#fde020',500:'#FBCD07',600:'#DAB107',700:'#9a7305' },
        },
        fontFamily: { heading:['Montserrat','system-ui','sans-serif'], body:['Open Sans','system-ui','sans-serif'] }
      }}
    }
  </script>
  <style>
    *{box-sizing:border-box}
    body{font-family:'Open Sans',system-ui,sans-serif;background:#f5f5f5;color:#000}
    .font-heading{font-family:'Montserrat',system-ui,sans-serif}
    ::selection{background:#AC161D;color:#fff}

    .position-card{
      background:#fff;
      border-radius:16px;
      box-shadow:0 2px 16px rgba(0,0,0,.07);
      overflow:hidden;
      page-break-inside:avoid;
      break-inside:avoid;
    }

    .cluster-tag{
      display:inline-flex;align-items:center;gap:.4rem;
      font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;
      padding:.3rem .75rem;border-radius:999px;
    }

    .detail-row{display:flex;gap:.5rem;align-items:flex-start;padding:.5rem 0;border-bottom:1px solid #f0f0f0}
    .detail-row:last-child{border-bottom:none}
    .detail-label{font-family:'Montserrat',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase;color:#8a8a8a;width:120px;flex-shrink:0;padding-top:.1rem}
    .detail-value{font-size:.82rem;color:#333;line-height:1.5;flex:1}

    .task-line{display:flex;gap:.5rem;align-items:flex-start;margin-bottom:.3rem}
    .task-line::before{content:'→';color:#AC161D;font-weight:700;flex-shrink:0;font-size:.8rem;margin-top:.1rem}

    .download-btn{
      display:inline-flex;align-items:center;gap:.5rem;
      background:#AC161D;color:#fff;
      font-family:'Montserrat',sans-serif;font-size:.75rem;font-weight:700;
      letter-spacing:.06em;text-transform:uppercase;
      padding:.6rem 1.2rem;border-radius:8px;border:none;cursor:pointer;
      transition:all .2s ease;
    }
    .download-btn:hover{background:#b91c22;transform:translateY(-1px)}

    .section-divider{
      font-family:'Montserrat',sans-serif;font-size:.7rem;font-weight:800;
      letter-spacing:.14em;text-transform:uppercase;
      color:#AC161D;border-bottom:2px solid #AC161D;
      padding-bottom:.5rem;margin-bottom:1.25rem;
    }

    @keyframes spin{to{transform:rotate(360deg)}}
    .spinner{width:36px;height:36px;border:3px solid #e5e5e5;border-top-color:#AC161D;border-radius:50%;animation:spin .8s linear infinite}

    .position-card{cursor:pointer;transition:box-shadow .25s ease,transform .25s ease;}
    .position-card:hover{box-shadow:0 8px 36px rgba(0,0,0,.14);transform:translateY(-2px);}

    .modal-backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.88);z-index:300;display:none;opacity:0;transition:opacity .35s cubic-bezier(.16,1,.3,1);}
    .modal-backdrop.active{display:flex;opacity:1;}
    .modal-content{transform:translateY(44px);opacity:0;transition:all .45s cubic-bezier(.16,1,.3,1) .08s;}
    .modal-backdrop.active .modal-content{transform:translateY(0);opacity:1;}

    @media print {
      @page { margin: 0.35in; size: letter portrait; }
      body { background:#fff !important; min-height:0 !important; }
      html { height:auto !important; }
      header, footer, .no-print { display:none !important; }
      main { padding:0 !important; max-width:100% !important; }

      /* Print one card: hide sibling cards + section headers, NOT the parent wrappers */
      body.print-one .position-card { display:none !important; }
      body.print-one .cluster-section-header { display:none !important; }
      body.print-one #card-print-target { display:block !important; box-shadow:none !important; border-radius:0 !important; page-break-after:avoid; }

      /* Print all: one card per page */
      body:not(.print-one) .position-card { page-break-after:always; break-after:page; box-shadow:none !important; margin-bottom:0 !important; }
      body:not(.print-one) .position-card:last-child { page-break-after:avoid; break-after:avoid; }
      body:not(.print-one) .cluster-section-header { page-break-after:avoid; break-after:avoid; }

      .modal-backdrop { display:none !important; }
      /* ── Compress each card to fit one page ── */
      .position-card > div:nth-child(1) { padding: 0.4rem 0.65rem !important; }
      .position-card > div:nth-child(1) .w-14 { width: 2rem !important; height: 2rem !important; border-radius: 8px !important; }
      .position-card > div:nth-child(1) h2 { font-size: 0.9rem !important; line-height: 1.2 !important; }
      .position-card > div:nth-child(1) p { font-size: 0.62rem !important; margin-top: 0 !important; }
      .cluster-tag { font-size: 0.5rem !important; padding: 0.1rem 0.35rem !important; margin-bottom: 0.1rem !important; display: inline-block !important; }
      .position-card > div:nth-child(2) { padding: 0.5rem 0.65rem !important; gap: 0.6rem !important; }
      .position-card > div:nth-child(3) { padding: 0.2rem 0.65rem !important; }
      .position-card > div:nth-child(3) p { font-size: 0.55rem !important; }
      .section-divider { font-size: 0.58rem !important; padding-bottom: 0.15rem !important; margin-bottom: 0.3rem !important; margin-top: 0.3rem !important; }
      .detail-row { padding: 0.12rem 0 !important; }
      .detail-label { font-size: 0.57rem !important; width: 76px !important; }
      .detail-value { font-size: 0.67rem !important; line-height: 1.3 !important; }
      .detail-value a { font-size: 0.67rem !important; }
      .task-line { margin-bottom: 0.06rem !important; }
      .task-line span { font-size: 0.67rem !important; line-height: 1.3 !important; }
      .task-line::before { font-size: 0.62rem !important; }
      .text-sm { font-size: 0.67rem !important; line-height: 1.35 !important; }
      .mb-5 { margin-bottom: 0.3rem !important; }
      .mb-4 { margin-bottom: 0.2rem !important; }
      .mt-6 { margin-top: 0.3rem !important; }
      p.italic { font-size: 0.65rem !important; margin-bottom: 0.25rem !important; }
    }
  </style>
</head>

<footer class="no-print py-8 px-6 text-center border-t border-gray-200 mt-10">

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxeHACK_6TtpOYYpo32qM5AGa962uiHOnE8-UF13x8hDqjeozKwpXbYtL7bOqTbZoBwNg/exec';

const SUPABASE_URL = 'https://bsgrkpykysvqcdqikcym.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJzZ3JrcHlreXN2cWNkcWlrY3ltIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzk1MTE5NzUsImV4cCI6MjA5NTA4Nzk3NX0.brdA4f7v0GC89fRXPTVPZV11KIdZxXyCkLTWWsoe0o0';

const BPS_LOGO     = 'https://res.cloudinary.com/dikkdclum/image/upload/v1778676762/field-experience/logos/bps101.png';
const LIB_LOGO     = 'https://res.cloudinary.com/dikkdclum/image/upload/v1780684358/field-experience/logos/batavia-library.svg';
const ORGANIC_LOGO = 'https://res.cloudinary.com/dikkdclum/image/upload/v1780684360/field-experience/logos/organic-life.webp';
const ORBIS_LOGO   = 'https://res.cloudinary.com/dikkdclum/image/upload/v1780684361/field-experience/logos/orbis-design.webp';

const CLUSTER_COLORS = {
  agriculture:   { bg:'#2d6a4f', light:'#d8f3dc' },
  arts:          { bg:'#7b2d8b', light:'#f3e8ff' },
  finance:       { bg:'#1a3a5c', light:'#dbeafe' },
  health:        { bg:'#AC161D', light:'#fee2e2' },
  human:         { bg:'#b45309', light:'#fef3c7' },
  it:            { bg:'#1e3a5f', light:'#dbeafe' },
  manufacturing: { bg:'#374151', light:'#f3f4f6' },
};

const CLUSTER_NAMES = {
  agriculture:   'Agriculture, Food & Natural Resources',
  arts:          'Arts & Communication',
  finance:       'Finance & Business Services',
  health:        'Health Sciences & Technology',
  human:         'Human & Public Services',
  it:            'Information Technology',
  manufacturing: 'Manufacturing, Engineering & Trades',
};

const CLUSTER_ORDER = ['finance','health','human','it','manufacturing','agriculture','arts'];

function esc(s){ return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;') }

// Known logos always take priority over any stored URL (auto-fetched URLs can expire)
function getLogoUrl(b) {
  const n = (b.name||'').toLowerCase();
  if (n.includes('batavia public library') || n.includes('batavia library')) return LIB_LOGO;
  if (n.includes('organic life')) return ORGANIC_LOGO;
  if (n.includes('bps') || n.includes('batavia public school')) return BPS_LOGO;
  if (n.includes('orbis')) return ORBIS_LOGO;
  return b.logo || '';
}

function getLogoBg(b) {
  const n = (b.name||'').toLowerCase();
  if (n.includes('bps') || n.includes('batavia public school')) return '#AC161D';
  if (n.includes('orbis')) return '#000000';
  return '#f9fafb';
}

function formatTasks(raw) {
  if (!raw) return '';
  return raw.split('\n')
    .map(s => s.replace(/^[-–•]\s*/,'').trim())
    .filter(Boolean)
    .map(s => `<div class="task-line"><span>${esc(s)}</span></div>`)
    .join('');
}

function formatList(raw) {
  if (!raw) return '<span class="text-navy-400">—</span>';
  return raw.split('\n')
    .map(s => s.replace(/^[-–•]\s*/,'').trim())
    .filter(Boolean)
    .join(' · ');
}

function normalizeCluster(raw) {
  const map = {
    'finance & business':'finance','business & finance':'finance',
    'health sciences':'health','health sciences & technology':'health',
    'human & public services':'human',
    'information technology':'it',
    'manufacturing, engineering, & trades':'manufacturing','manufacturing, engineering & trades':'manufacturing','manufacturing':'manufacturing',
    'agriculture, food & natural resources':'agriculture','agriculture':'agriculture',
    'arts & communication':'arts','arts':'arts',
  };
  return map[(raw||'').toLowerCase().trim()] || 'other';
}

let allPositions = [];

function buildCard(b, idx) {
  const logoUrl = getLogoUrl(b);
  const logoBg  = getLogoBg(b);
  const clusterId = normalizeCluster(b.clusterId || b.sector || '');
  const colors = CLUSTER_COLORS[clusterId] || { bg:'#374151', light:'#f3f4f6' };

  const logoHtml = logoUrl
    ? `<img src="${esc(logoUrl)}" alt="${esc(b.name)}" class="w-full h-full object-contain p-2">`
    : `<span class="font-heading font-bold text-xl text-white">${esc((b.name||'?').charAt(0))}</span>`;

  return `
  <div class="position-card" id="card-${idx}" onclick="openJobModal(${idx})">

    <!-- Card header -->
    <div class="px-7 py-5 flex items-start justify-between gap-4" style="background:${colors.bg}">
      <div class="flex items-center gap-4">
        <div class="w-14 h-14 rounded-xl flex items-center justify-center flex-shrink-0 overflow-hidden" style="background:${logoBg}">
          ${logoHtml}
        </div>
        <div>
          <span class="cluster-tag text-white mb-1 inline-block" style="background:rgba(255,255,255,.2)">${esc(CLUSTER_NAMES[clusterId] || b.sector || '')}</span>
          <h2 class="font-heading font-black text-white text-xl leading-tight">${esc(b.name)}</h2>
          <p class="text-white/80 text-sm mt-0.5 font-semibold">${esc(b.role || 'Internship')}</p>
        </div>
      </div>
      <button
        onclick="event.stopPropagation();downloadCard(${idx})"
        class="download-btn no-print flex-shrink-0"
        style="background:rgba(255,255,255,.2);border:1.5px solid rgba(255,255,255,.4)"
        onmouseover="this.style.background='rgba(255,255,255,.35)'"
        onmouseout="this.style.background='rgba(255,255,255,.2)'">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/></svg>
        Print / Save as PDF
      </button>
    </div>

    <!-- Card body -->
    <div class="px-7 py-6 grid md:grid-cols-2 gap-8">

      <!-- Left col -->
      <div>
        <p class="section-divider">Position Overview</p>
        ${b.mission ? `<p class="text-sm text-navy-600 leading-relaxed mb-5 italic">"${esc(b.mission)}"</p>` : ''}
        <div class="detail-row">
          <span class="detail-label">Compensation</span>
          <span class="detail-value font-semibold" style="color:${colors.bg}">${esc(b.compensation||'—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Hours</span>
          <span class="detail-value">${esc(b.hours||'—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Environment</span>
          <span class="detail-value">${esc(b.environment||'—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Openings</span>
          <span class="detail-value">${esc(b.numStudents||'—')}</span>
        </div>
        ${b.website ? `<div class="detail-row"><span class="detail-label">Website</span><span class="detail-value"><a href="${esc(b.website)}" class="text-blue-600 underline" target="_blank">${esc(b.website)}</a></span></div>` : ''}

        <p class="section-divider mt-6">Mentor Contact</p>
        <div class="detail-row">
          <span class="detail-label">Name</span>
          <span class="detail-value font-semibold">${esc(b.mentorName||'—')}</span>
        </div>
        <div class="detail-row">
          <span class="detail-label">Email</span>
          <span class="detail-value">${b.mentorEmail ? `<a href="mailto:${esc(b.mentorEmail)}" class="text-blue-600">${esc(b.mentorEmail)}</a>` : '—'}</span>
        </div>
      </div>

      <!-- Right col -->
      <div>
        <p class="section-divider">Responsibilities</p>
        <div class="mb-5 text-sm leading-relaxed">${formatTasks(b.tasks)}</div>

        <p class="section-divider">Skills Students Will Develop</p>
        <p class="text-sm text-navy-600 leading-relaxed mb-5">${esc(formatList(b.skills))}</p>

        ${b.reqs || b.specificReqs ? `
        <p class="section-divider">Requirements</p>
        <p class="text-sm text-navy-600 leading-relaxed mb-5">${esc(formatList((b.reqs||'') + (b.specificReqs ? '\n'+b.specificReqs : '')))}</p>
        ` : ''}

        ${b.idealCandidate ? `
        <p class="section-divider">Ideal Candidate</p>
        <p class="text-sm text-navy-600 leading-relaxed italic">"${esc(b.idealCandidate)}"</p>
        ` : ''}
      </div>

    </div>

    <!-- Approval footer -->
    <div class="px-7 py-4 flex items-center justify-between gap-4 flex-wrap" style="background:#f9fafb;border-top:1px solid #e5e5e5">
      <p class="text-xs text-navy-400 font-heading">BHS Field Experience · For Business Partner Review & Approval</p>
      <p class="text-xs text-navy-400 font-heading">Prepared by Michael Theriault · <a href="mailto:michael@bps101.net" class="text-crimson-700">michael@bps101.net</a></p>
    </div>

  </div>`;
}

function downloadCard(idx) {
  const card = document.getElementById(`card-${idx}`);
  if (!card) return;

  card.id = 'card-print-target';
  document.body.classList.add('print-one');

  // Small delay so DOM paint completes before print dialog opens
  setTimeout(() => {
    window.print();
    // Restore after dialog closes
    setTimeout(() => {
      card.id = `card-${idx}`;
      document.body.classList.remove('print-one');
    }, 1000);
  }, 80);
}

function downloadAll() {
  // Remove single-card mode so all cards print, one per page
  document.body.classList.remove('print-one');
  window.print();
}

function normalizeRow(row) {
  const sector = (row['Industry/Sector:'] || '').trim();
  return {
    name:            (row['Company Name']||'').trim(),
    sector,
    website:         (row['Company Website']||'').trim(),
    logo:            (row['Company Logo ']||'').trim(),
    mission:         (row['Brief Mission Statement']||'').trim(),
    role:            (row['Internship Role Title  (e.g., marketing assistant, shadow, architect). ']||'').trim(),
    tasks:           (row['Primary Tasks & Responsibilities (Use Bullet Points)']||'').trim(),
    skills:          (row['Top Skills Student will develop']||row['Top 3 Skills Student will develop']||'').trim(),
    environment:     (row['Work Environment']||'').trim(),
    compensation:    (row['Compensation - Hourly, Scholarship, stipend, etc']||'').trim(),
    hours:           (row['Weekly Time Commitment']||'').trim(),
    reqs:            (row['Student Requirements']||'').trim(),
    specificReqs:    (row['What are the specific requirements?']||'').trim(),
    numStudents:     (row['Number of students Requested']||'').trim(),
    mentorName:      (row['Primary Mentor Name']||'').trim(),
    mentorEmail:     (row['Mentor Email']||'').trim(),
    appLink:         (row['Direct Application Link (If you have your own portal that you require).']||'').trim(),
    appInstructions: (row['Application Instructions']||'').trim(),
    idealCandidate:  (row['What is your ideal candidate?']||'').trim(),
    otherInfo:       (row['Any other important information to share']||'').trim(),
    clusterId:       normalizeCluster(sector),
  };
}

async function loadFromSupabase() {
  try {
    const resp = await fetch(
      `${SUPABASE_URL}/rest/v1/job_listings?select=*&is_active=eq.true`,
      { headers: { apikey: SUPABASE_KEY, Authorization: 'Bearer ' + SUPABASE_KEY } }
    );
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const data = await resp.json();
    if (!Array.isArray(data) || !data.length) return [];
    return data.map(row => {
      const sector = (row.industry || '').split(',')[0].trim();
      return {
        name:            (row.company_name || '').trim(),
        sector,
        website:         (row.company_website || '').trim(),
        logo:            (row.company_logo || '').trim(),
        mission:         (row.mission_statement || '').trim(),

        numStudents:     row.num_students ? String(row.num_students) : '',
        mentorName:      (row.mentor_name || '').trim(),
        mentorEmail:     (row.mentor_email || '').trim(),

        idealCandidate:  (row.ideal_candidate || '').trim(),

      };
    });
  } catch(e) { console.error('[FE positions]', e.message, e); return []; }
}

async function loadPositions() {
  const [sbRows, sheetRows] = await Promise.allSettled([
    loadFromSupabase(),
    fetch(APPS_SCRIPT_URL).then(r => r.ok ? r.json() : Promise.reject()).then(rows =>
      (Array.isArray(rows) ? rows : []).map(normalizeRow).filter(b => b.name)
    ),
  ]).then(results => results.map(r => r.status === 'fulfilled' ? r.value : []));

  // Supabase wins on name collision
  const sbNames = new Set(sbRows.map(r => r.name.toLowerCase()));
  const merged = [
    ...sbRows,
    ...sheetRows.filter(r => !sbNames.has(r.name.toLowerCase())),
  ].map((p, idx) => ({ ...p, idx }));

  if (merged.length > 0) {
    allPositions = merged;
    render();
  } else {
    allPositions = [...STATIC_BUSINESSES];
    render();
  }
}

function render() {
  document.getElementById('loading-state').classList.add('hidden');

  if (!allPositions.length) {
    document.getElementById('error-state').classList.remove('hidden');
    return;
  }

  document.getElementById('position-count').textContent = `${allPositions.length} position${allPositions.length !== 1 ? 's' : ''}`;
  document.getElementById('download-all-btn').classList.remove('hidden');

  // Group by cluster
  const groups = {};
  allPositions.forEach((b, idx) => {
    const cid = normalizeCluster(b.clusterId || b.sector || '');
    if (!groups[cid]) groups[cid] = [];
    groups[cid].push({ b, idx });
  });

  const list = document.getElementById('positions-list');
  list.classList.remove('hidden');

  const order = [...CLUSTER_ORDER, 'other'];
  order.forEach(cid => {
    if (!groups[cid]?.length) return;
    const colors = CLUSTER_COLORS[cid] || { bg:'#374151', light:'#f3f4f6' };
    const section = document.createElement('div');
    section.className = 'cluster-section';
    section.innerHTML = `
      <div class="no-print cluster-section-header flex items-center gap-4 mb-6">
        <div class="flex-1 h-px" style="background:${colors.bg};opacity:.3"></div>
        <h2 class="font-heading font-black text-lg tracking-tight" style="color:${colors.bg}">${CLUSTER_NAMES[cid] || cid}</h2>
        <div class="flex-1 h-px" style="background:${colors.bg};opacity:.3"></div>
      </div>
      <div class="space-y-6">${groups[cid].map(({b,idx}) => buildCard(b,idx)).join('')}</div>
    `;
    list.appendChild(section);
  });
}
