<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script>if(sessionStorage.getItem('fe_teacher_auth')!=='1'){location.replace('index.html')}</script>
  <title>Email Templates — Field Experience BHS</title>
  <link rel="icon" type="image/png" href="https://res.cloudinary.com/dsbllwpbh/image/upload/v1771966521/fieldexperience-favicon_jgdotp.png">
  <link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={theme:{extend:{colors:{crimson:{800:'#AC161D'},gold:{400:'#fde020',500:'#FBCD07'}},fontFamily:{heading:['Montserrat','system-ui','sans-serif']}}}}</script>
  <style>
    *{box-sizing:border-box}body{font-family:'Open Sans',system-ui,sans-serif;background:#f7f7f9;color:#1c1f2e;overflow-x:hidden}
    .font-heading{font-family:'Montserrat',system-ui,sans-serif}
    .teacher-nav{position:fixed;top:0;left:0;right:0;background:rgba(255,255,255,.97);backdrop-filter:blur(12px);border-bottom:1px solid #e5e7eb;z-index:50;}
    .teacher-badge{background:rgba(251,205,7,.15);color:#92400e;font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:800;letter-spacing:.12em;text-transform:uppercase;padding:.25rem .75rem;border-radius:999px;border:1px solid rgba(251,205,7,.35);}
    .section-label{font-family:'Montserrat',sans-serif;font-size:.7rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;}
    .email-card{background:#fff;border:1.5px solid #e5e7eb;border-radius:20px;padding:1.75rem;margin-bottom:1.5rem;box-shadow:0 1px 3px rgba(16,24,40,.04);}
    .email-body{background:#f9fafb;border:1px solid #e5e7eb;border-radius:10px;padding:1.25rem;font-size:.85rem;line-height:1.7;color:#374151;white-space:pre-wrap;font-family:'Open Sans',sans-serif;}
    .meta-row{display:flex;align-items:center;gap:.5rem;margin-bottom:.35rem;}
    .meta-label{font-family:'Montserrat',sans-serif;font-size:.65rem;font-weight:800;letter-spacing:.08em;text-transform:uppercase;color:#9ca3af;width:3.5rem;flex-shrink:0;}
    .meta-val{font-size:.85rem;color:#374151;}
    .btn{display:inline-flex;align-items:center;gap:.4rem;font-family:'Montserrat',sans-serif;font-size:.75rem;font-weight:700;letter-spacing:.04em;text-transform:uppercase;padding:.5rem 1rem;border-radius:999px;border:none;cursor:pointer;transition:all .2s;}
    .btn-copy{background:rgba(251,205,7,.12);color:#92400e;border:1px solid rgba(251,205,7,.35);}.btn-copy:hover{background:rgba(251,205,7,.22);}
    .btn-copy.copied{background:rgba(34,197,94,.15);color:#15803d;border-color:rgba(34,197,94,.35);}
    .btn-mailto{background:#f3f4f6;color:#374151;}.btn-mailto:hover{background:#e5e7eb;}
    .tag-pill{display:inline-block;font-family:'Montserrat',sans-serif;font-size:.6rem;font-weight:800;letter-spacing:.06em;text-transform:uppercase;padding:.2rem .65rem;border-radius:999px;}
    [data-bracket]{background:#FBCD07;color:#111827;padding:0 2px;border-radius:3px;font-size:.8em;}
  </style>
</head>
<body>

<nav class="teacher-nav"><div class="max-w-7xl mx-auto px-5 py-3 flex items-center justify-between">
  <a href="teacher-hub.html" class="flex items-center gap-2 text-sm font-semibold text-gray-500 hover:text-gray-900 transition-colors font-heading">
    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>Teacher Hub
  </a>
  <div class="flex items-center gap-3">
    <a href="index.html"><img src="https://res.cloudinary.com/dsbllwpbh/image/upload/v1770990807/field-study-logo-trans_kewube.png" alt="BPS101" class="h-8 w-auto"></a>
    <span class="teacher-badge">Teacher</span>
  </div>
  <button onclick="logoutTeacher()" class="text-sm font-semibold text-gray-500 hover:text-gray-900 transition-colors font-heading">Log Out</button>
</div></nav>

<section style="margin-top:57px;background:linear-gradient(135deg,#0e1520 0%,#241f0d 100%);padding:2.5rem 1.5rem 2rem">
  <div class="max-w-3xl mx-auto">
    <span class="section-label mb-2 block" style="color:#FBCD07">Teacher Resource</span>
    <h1 class="font-heading text-3xl font-black text-white tracking-tight">Email Templates</h1>
    <p class="mt-1" style="color:rgba(255,255,255,.5)">Pre-written for common Field Experience situations. Fill in the <span style="background:#FBCD07;color:#111827;padding:0 4px;border-radius:3px;font-size:.85em">[brackets]</span> before sending.</p>
  </div>
</section>

<section style="background:#f7f7f9;padding:2rem 1.5rem 5rem">
  <div class="max-w-3xl mx-auto" id="templates-container"></div>
</section>

<footer style="background:#fff;border-top:1px solid #e5e7eb;padding:1.5rem;text-align:center">
  <p class="text-xs" style="color:#9ca3af">BHS Field Experience &bull; Teacher Area &bull; <a href="#" onclick="logoutTeacher();return false;" style="color:#6b7280;text-decoration:none">Log Out</a></p>
</footer>

<script>
  function logoutTeacher(){sessionStorage.removeItem('fe_teacher_auth');location.href='index.html';}

  const TEMPLATES=[
    {
      title:'Welcome to Your Placement',
      to:'Student',
      tag:'First Day',
      tagColor:{bg:'rgba(34,197,94,.12)',color:'#15803d'},
      subject:'Welcome to Your Field Experience Placement!',
      body:`Hi [Student First Name],

Welcome to your Field Experience placement at [Site Name]! I am so excited for you to begin this journey.

A few reminders before your first day:
• Arrive on time — or a few minutes early
• Dress professionally as we discussed in the bootcamp
• Be ready to listen, observe, and learn — even if the first day feels slow
• Your supervisor is [Supervisor Name] — reach out to them if you have any questions on site

If anything comes up during your placement — questions, concerns, or anything at all — reach out to me at [your email] or stop by my room.

You've prepared for this. Go show them what you're made of.

— [Your Name]
BHS Field Experience, Batavia High School`
    },
    {
      title:'Student Absent from Placement',
      to:'Site Supervisor',
      tag:'Absence',
      tagColor:{bg:'rgba(239,68,68,.12)',color:'#dc2626'},
      subject:'[Student Name] — Absent Today',
      body:`Hi [Supervisor Name],

I wanted to give you a heads-up that [Student First Name] [Student Last Name] will not be at your site today, [Date], due to [illness/a school commitment/a family situation].

I apologize for any inconvenience this may cause your team. [Student Name] is expected to return on [Return Date]. If this changes, I will notify you right away.

Please don't hesitate to reach out if you have any questions.

Thank you again for everything you do for our Field Experience students.

— [Your Name]
BHS Field Experience | [Your Phone]`
    },
    {
      title:'Mid-Semester Check-In',
      to:'Site Supervisor',
      tag:'Check-In',
      tagColor:{bg:'rgba(59,130,246,.12)',color:'#1d4ed8'},
      subject:'BHS Field Experience — Mid-Semester Check-In',
      body:`Hi [Supervisor Name],

We're at the midpoint of the semester and I wanted to check in on [Student Name]'s experience at [Site Name].

A few things I'd love your quick feedback on:
1. How is [Student Name] showing up — on time, prepared, and engaged?
2. Are they meeting your expectations professionally?
3. Is there anything specific you'd like them to work on in the second half?

Feel free to reply here or call me at [Your Phone] if it's easier to talk.

I'll also be scheduling site visits soon and would love to find a time to stop in. I'm flexible — just let me know what works for your schedule.

Thank you for investing your time in a young person's future. It genuinely makes a difference.

— [Your Name]
BHS Field Experience, Batavia High School`
    },
    {
      title:'End of Semester Thank You',
      to:'Site Supervisor',
      tag:'Thank You',
      tagColor:{bg:'rgba(251,205,7,.15)',color:'#92400e'},
      subject:'Thank You — BHS Field Experience',
      body:`Dear [Supervisor Name],

As we wrap up the semester, I want to take a moment to sincerely thank you and the entire team at [Site Name] for hosting [Student Name] in our Field Experience program.

The real-world exposure, mentorship, and professional environment you provided is something no classroom can replicate. Students who complete quality placements like yours come back to school different — more confident, more focused, and more ready for what comes next.

[Student Name] spoke highly of [him/her/them] experience at your site. [Optional personal note: "They especially appreciated [specific thing]."]

We hope to partner with you again. Thank you for believing in the next generation of professionals.

With gratitude,

[Your Name]
BHS Field Experience, Batavia High School
[Your Email] | [Your Phone]`
    },
    {
      title:'Performance Concern Notice',
      to:'Parent / Guardian',
      tag:'Concern',
      tagColor:{bg:'rgba(239,68,68,.12)',color:'#dc2626'},
      subject:'Field Experience — Check-In Needed Re: [Student Name]',
      body:`Hi [Parent/Guardian Name],

I'm reaching out because I'd like to connect with you about [Student Name]'s recent performance in the Field Experience program.

Specifically, I've received feedback from [Site Name] regarding [brief, factual description of concern — e.g., "a pattern of late arrivals" or "difficulty following workplace expectations"]. I want to address this early so we can put a plan in place.

This program is a genuine opportunity and I'd like to make sure [Student Name] gets the full benefit of it. Could we find 15–20 minutes this week to talk?

My available times are: [list times]

I also encourage [Student Name] to reach out to me directly — my door is open.

Thank you,

[Your Name]
BHS Field Experience, Batavia High School
[Your Email]`
    },
    {
      title:'Placement Confirmation',
      to:'Site Supervisor',
      tag:'Logistics',
      tagColor:{bg:'rgba(168,85,247,.12)',color:'#7e22ce'},
      subject:'Field Experience Placement Confirmation — [Student Name]',
      body:`Hi [Supervisor Name],

I'm confirming the placement details for [Student Name] from Batavia High School ahead of their start date.

Student: [Full Student Name]
Start Date: [Date]
Schedule: [Days of week, e.g., Mon/Wed/Fri] | [Start time] – [End time]
Reporting to: [Supervisor Name]
Site Address: [Address]

Please let me know if any of these details need to be updated. I'll also be sharing a brief orientation checklist with [Student Name] before day one.

If you have any questions or would like to connect before the start date, feel free to reach out.

Thank you for being a Field Experience partner!

— [Your Name]
BHS Field Experience, Batavia High School
[Your Email] | [Your Phone]`
    },
  ];

  function copyTemplate(idx){
    const t=TEMPLATES[idx];
    const text=`SUBJECT: ${t.subject}\n\n${t.body}`;
    navigator.clipboard.writeText(text).then(()=>{
      const btn=document.getElementById('copy-btn-'+idx);
      btn.innerHTML='<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!';
      btn.classList.add('copied');
      setTimeout(()=>{btn.innerHTML='<svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg> Copy Template';btn.classList.remove('copied');},2500);
    }).catch(()=>{
      const ta=document.createElement('textarea');ta.value=text;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);
      const btn=document.getElementById('copy-btn-'+idx);btn.textContent='Copied!';btn.classList.add('copied');setTimeout(()=>{btn.textContent='Copy Template';btn.classList.remove('copied');},2500);
    });
  }

  function openMailto(idx){
    const t=TEMPLATES[idx];
    window.open('mailto:?subject='+encodeURIComponent(t.subject)+'&body='+encodeURIComponent(t.body));
  }

  function render(){
    document.getElementById('templates-container').innerHTML=TEMPLATES.map((t,i)=>`
      <div class="email-card">
        <div class="flex flex-wrap items-start justify-between gap-3 mb-4">
          <div>
            <span class="tag-pill mb-2" style="background:${t.tagColor.bg};color:${t.tagColor.color}">${t.tag}</span>
            <h2 class="font-heading font-bold text-gray-900 text-lg">${t.title}</h2>
            <p class="text-sm mt-0.5" style="color:#6b7280">To: ${t.to}</p>
          </div>
          <div class="flex gap-2">
            <button id="copy-btn-${i}" class="btn btn-copy" onclick="copyTemplate(${i})">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5H6a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2v-1M8 5a2 2 0 002 2h2a2 2 0 002-2M8 5a2 2 0 012-2h2a2 2 0 012 2m0 0h2a2 2 0 012 2v3m2 4H10m0 0l3-3m-3 3l3 3"/></svg>
              Copy Template
            </button>
            <button class="btn btn-mailto" onclick="openMailto(${i})">
              <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/></svg>
              Open in Mail
            </button>
          </div>
        </div>
        <div class="meta-row"><span class="meta-label">Subject</span><span class="meta-val">${t.subject}</span></div>
        <div style="margin-top:1rem">
          <p class="text-xs mb-1.5" style="color:#9ca3af;font-family:'Montserrat',sans-serif;font-weight:700;letter-spacing:.06em;text-transform:uppercase">Body</p>
          <div class="email-body">${t.body}</div>
        </div>
      </div>
    `).join('');
  }

  window.addEventListener('DOMContentLoaded', render);
</script>
</body>
</html>
